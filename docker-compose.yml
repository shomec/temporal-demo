version: '3.9'

services:
  postgresql:
    image: postgres:13
    environment:
      - POSTGRES_PASSWORD=temporal
      - POSTGRES_USER=temporal
    ports:
      - "5432:5432"

  # --- Temporal Server & Dependencies ---
  temporal:
    image: temporalio/auto-setup:1.22.3
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
      - USE_INTERNAL_FE=true
    depends_on:
      - postgresql
    labels:
      - "com.temporal.description=Temporal Server"

  temporal-ui:
    image: temporalio/ui:2.21.3
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000
    depends_on:
      - temporal
    labels:
      - "com.temporal.description=Temporal Web UI"

  # --- Custom Application Services ---
  order-service:
    build:
      context: ./order-service
    ports:
      - "8081:8081"
    environment:
      - temporal.target=temporal:7233
      # Assuming temporal-demo is the root folder name handling docker context
    depends_on:
      - temporal
    volumes:
      - order-db-data:/app/data

  payment-service:
    build:
      context: ./payment-service
    environment:
      - temporal.target=temporal:7233
    depends_on:
      - temporal

volumes:
  order-db-data:
